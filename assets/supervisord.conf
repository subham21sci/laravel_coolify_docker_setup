[supervisord]
nodaemon=true

[program:php-fpm]
command=php-fpm -F
autostart=true
autorestart=true

[program:nginx]
command=nginx -c /app/assets/nginx.conf
autostart=true
autorestart=true

[program:laravel-worker]
command=php artisan queue:work --sleep=3 --tries=3
autostart=true
autorestart=true
numprocs=2
