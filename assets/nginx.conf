events {}

http {
    server {
        listen ${PORT};

        root /app/public;
        index index.php index.html;

        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        location ~ \.php$ {
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_index index.php;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME /app/public$fastcgi_script_name;
        }

        location ~ /\.ht {
            deny all;
        }
    }
}
